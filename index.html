<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Gọi Món K-Coffee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <div class="left-panel">
            
            <div class="table-selector" style="margin-bottom: 20px;">
                <label>Vị trí:</label>
                <select id="floor-select">
                    <option value="Trệt">Trệt</option>
                    <option value="Lầu">Lầu</option>
                </select>
                
                <label>Bàn:</label>
                <select id="table-select">
                    <option value="1">Số 1</option>
                    <option value="2">Số 2</option>
                    <option value="3">Số 3</option>
                    <option value="4">Số 4</option>
                    <option value="5">Số 5</option>
                    <option value="6">Số 6</option>
                    <option value="7">Số 7</option>
                    <option value="8">Số 8</option>
                    <option value="9">Số 9</option>
                    <option value="10">Số 10</option>
                </select>
            </div>

            <div class="menu-box">
                <h2>Thực Đơn Màn Hình Cảm Ứng</h2>
                <div id="menu-container" class="menu-grid">
                    </div>
            </div>

        </div>

        <div class="right-panel cart-box">
            <h2>Giỏ Hàng</h2>
            
            <ul id="cart-list" style="min-height: 120px; background: #fff; border-radius: 8px; padding: 15px; margin: 15px 0; border: 2px dashed #bdc3c7;">
                </ul>
            
            <div class="order-notes">
                <input type="text" id="order-note" placeholder="📝 Ghi chú (VD: ít đá, ít ngọt...)">
            </div>
            
            <div class="cart-summary">
                <h3>Tổng cộng: <span id="total-price" style="color: #e74c3c;">0</span> VNĐ</h3>
                <button onclick="sendOrder()" class="btn-send">GỬI XUỐNG QUẦY PHA CHẾ</button>
            </div>

            <div class="admin-box" style="margin-top: 50px; border-top: 2px dashed #ccc; padding-top: 20px;">
                <h3 style="color: #7f8c8d;">Cài đặt (Dành cho quản lý)</h3>
                <div class="input-group">
                    <input type="text" id="item-name" placeholder="Tên món (VD: Bạc xỉu)">
                    <input type="number" id="item-price" placeholder="Giá (VD: 30000)">
                    <input type="text" id="item-category" placeholder="Nhóm (VD: Coffee)">
                    <button onclick="submitNewItem()" class="btn-add">+ Thêm vào Menu</button>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Gọi Món K-Coffee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <div class="left-panel">
            <div class="admin-box">
                <h3>Thêm Món Mới (Dành cho quản lý)</h3>
                <div class="input-group">
                    <input type="text" id="item-name" placeholder="Tên món (VD: Bạc xỉu)">
                    <input type="number" id="item-price" placeholder="Giá (VD: 30000)">
                    <input type="text" id="item-category" placeholder="Nhóm (VD: Coffee)">
                    <button onclick="submitNewItem()" class="btn-add">+ Thêm vào Menu</button>
                </div>
                <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">
            <h3>Thống Kê Doanh Thu</h3>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button onclick="checkRevenue()" class="btn-add" style="background: #8e44ad; padding: 12px 20px;">💰 Chốt Sổ Hôm Nay</button>
                <div style="font-size: 18px; font-weight: bold;">
                    Tổng thu: <span id="revenue-display" style="color: #27ae60; font-size: 24px;">0</span> VNĐ
                </div>
            </div>
            </div>

            <div class="menu-box">
                <h2>Thực Đơn Màn Hình Cảm Ứng</h2>
                <div id="menu-container" class="menu-grid">
                    </div>
            </div>
        </div>

        <div class="right-panel cart-box">
            <h2>Giỏ Hàng (Bàn 1)</h2>
            <ul id="cart-list">
                </ul>
            <div class="cart-summary">
                <h3>Tổng cộng: <span id="total-price" style="color: #e74c3c;">0</span> VNĐ</h3>
                <button onclick="sendOrder('Bàn 1')" class="btn-send">GỬI XUỐNG QUẦY PHA CHẾ</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>

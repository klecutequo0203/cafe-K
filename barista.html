<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn Hình Pha Chế</title>
    <style>
        /* Giao diện nền tối cho Barista */
        body { font-family: Arial, sans-serif; background-color: #2c3e50; color: white; padding: 20px; }
        h1 { text-align: center; color: #ecf0f1; border-bottom: 2px dashed #7f8c8d; padding-bottom: 10px;}
        
        /* Căn giữa nút bấm và dòng doanh thu */
        .header-actions { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        
        .btn-revenue { 
            background: #8e44ad; color: white; border: none; 
            padding: 10px 20px; font-size: 16px; border-radius: 5px; 
            cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        .btn-revenue:hover { background: #9b59b6; }

        /* Khung hiển thị doanh thu (lúc đầu ẩn đi) */
        #revenue-text {
            display: none; 
            margin-left: 20px;
            font-size: 20px;
            font-weight: bold;
            background: #27ae60;
            padding: 8px 15px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .orders-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;}
        
        /* Giao diện của một tờ Bill order */
        .order-ticket { 
            background: #ecf0f1; color: #2c3e50; padding: 15px; 
            border-radius: 8px; width: 280px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); 
            border-top: 5px solid #e67e22; 
        }
        .order-header { 
            font-size: 20px; font-weight: bold; 
            border-bottom: 2px solid #bdc3c7; 
            padding-bottom: 10px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .order-items { list-style: none; padding: 0; margin: 0 0 15px 0; font-size: 18px;}
        .order-items li { margin-bottom: 8px; font-weight: bold;}
        
        /* Nút bấm hoàn thành món */
        .btn-done { 
            background: #27ae60; color: white; border: none; 
            padding: 12px; width: 100%; font-size: 16px; 
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .btn-done:hover { background: #2ecc71; }
    </style>
</head>
<body>
    <h1>☕ BẢNG THEO DÕI ĐƠN HÀNG (LIVE)</h1>
    
    <div class="header-actions">
        <button class="btn-revenue" onclick="getRevenue()">💰 Chốt Sổ Doanh Thu</button>
        <div id="revenue-text">
            Doanh thu: <span id="revenue-amount" style="color: #f1c40f; font-size: 24px;">0</span> VNĐ
        </div>
    </div>
    
    <div class="orders-grid" id="orders-container">
    </div>

    <script>
        const container = document.getElementById("orders-container");
        let ws; // Khai báo biến ws ở ngoài cùng

        // Tạo một hàm chuyên làm nhiệm vụ kết nối
        function connectWebSocket() {
            ws = new WebSocket("wss://cafe-k.onrender.com/ws");

            ws.onopen = () => {
                console.log("✅ Quầy pha chế đã trực tuyến!");
            };

            // Khi có tin nhắn từ máy chủ dội về (giữ nguyên code cũ của bạn)
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data); 
                
                if (data.type === "NEW_ORDER") {
                    const ticket = document.createElement("div");
                    ticket.className = "order-ticket";
                    
                    const timeStr = new Date(data.timestamp).toLocaleTimeString("vi-VN", {hour: '2-digit', minute:'2-digit'});

                    let itemsHtml = "";
                    data.items.forEach(item => {
                        itemsHtml += `<li>🔸 ${item.quantity} x ${item.name}</li>`;
                    });

                    // Hiện ghi chú nếu có
                    let noteHtml = "";
                    if (data.note && data.note.trim() !== "") {
                        noteHtml = `<div style="background: #f39c12; color: white; padding: 8px; border-radius: 4px; margin-bottom: 10px; font-weight: bold; font-size: 16px;">📝 Ghi chú: ${data.note}</div>`;
                    }

                    ticket.innerHTML = `
                        <div class="order-header">
                            <span>🛎️ ${data.table}</span>
                            <span style="font-size: 14px; color: #7f8c8d;">${timeStr}</span>
                        </div>
                        ${noteHtml}
                        <ul class="order-items">
                            ${itemsHtml}
                        </ul>
                        <button class="btn-done" onclick="this.parentElement.remove()">ĐÃ LÀM XONG ✔️</button>
                    `;

                    container.appendChild(ticket);
                }
            };

            // 🔴 NẾU BỊ ĐỨT KẾT NỐI -> TỰ ĐỘNG GỌI LẠI SAU 3 GIÂY
            ws.onclose = () => {
                console.log("⚠️ Mất kết nối tới máy chủ. Đang thử kết nối lại...");
                setTimeout(connectWebSocket, 3000); 
            };

            // 🔴 NẾU CÓ LỖI MẠNG -> ĐÓNG KẾT NỐI ĐỂ KÍCH HOẠT TỰ ĐỘNG GỌI LẠI
            ws.onerror = (error) => {
                console.error("❌ Lỗi mạng WebSocket:", error);
                ws.close();
            };
        }

        // Kích hoạt máy bơm chạy lần đầu tiên khi mở web
        connectWebSocket();

        
        

        // Hàm tính tổng doanh thu và hiển thị ra chữ
        async function getRevenue() {
            try {
                const response = await fetch("https://cafe-k.onrender.com/api/revenue");
                if (response.ok) {
                    const data = await response.json();
                    const total = data.total_revenue || 0; 
                    
                    // Điền số tiền vào khung
                    document.getElementById("revenue-amount").innerText = total.toLocaleString("vi-VN");
                    
                    // Hiển thị khung chữ "Doanh thu: ..." lên màn hình
                    document.getElementById("revenue-text").style.display = "block";
                    
                } else {
                    alert("❌ Lỗi: Không thể lấy được dữ liệu chốt sổ!");
                }
            } catch (error) {
                console.error("Lỗi kết nối:", error);
                alert("❌ Lỗi mạng: Không kết nối được tới máy chủ Render!");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn Hình Pha Chế</title>
    <style>
        /* Giao diện nền tối cho Barista dễ nhìn, đỡ mỏi mắt */
        body { font-family: Arial, sans-serif; background-color: #2c3e50; color: white; padding: 20px; }
        h1 { text-align: center; color: #ecf0f1; border-bottom: 2px dashed #7f8c8d; padding-bottom: 10px;}
        
        /* CSS cho nút Chốt sổ */
        .header-actions { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-revenue { 
            background: #8e44ad; color: white; border: none; 
            padding: 10px 20px; font-size: 16px; border-radius: 5px; 
            cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        .btn-revenue:hover { background: #9b59b6; }

        .orders-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;}
        
        /* Giao diện của một tờ Bill order */
        .order-ticket { 
            background: #ecf0f1; color: #2c3e50; padding: 15px; 
            border-radius: 8px; width: 280px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); 
            border-top: 5px solid #e67e22; /* Viền cam nổi bật */
        }
        .order-header { 
            font-size: 20px; font-weight: bold; 
            border-bottom: 2px solid #bdc3c7; 
            padding-bottom: 10px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .order-items { list-style: none; padding: 0; margin: 0 0 15px 0; font-size: 18px;}
        .order-items li { margin-bottom: 8px; font-weight: bold;}
        
        /* Nút bấm hoàn thành món */
        .btn-done { 
            background: #27ae60; color: white; border: none; 
            padding: 12px; width: 100%; font-size: 16px; 
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .btn-done:hover { background: #2ecc71; }
    </style>
</head>
<body>
    <h1>☕ BẢNG THEO DÕI ĐƠN HÀNG (LIVE)</h1>
    
    <div class="header-actions">
        <button class="btn-revenue" onclick="getRevenue()">💰 Chốt Sổ Doanh Thu</button>
    </div>
    
    <div class="orders-grid" id="orders-container">
    </div>
